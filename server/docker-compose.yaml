version: "23.0.1"
services:
  mongo:
    image: mongo:7
    container_name: mongo_container
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
  server:
    build: ./
    container_name: server_container
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    stdin_open: true
    tty: true
    environment:
      - MONGO_URL=mongodb://mongo:27017/mydb
  caddy:
    image: caddy:latest
    container_name: caddy_container
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./site:/srv
      - caddy_data:/data
      - caddy_config:/caddy_config
volumes:
  mongo-data:
  caddy_data:
  caddy_config:
